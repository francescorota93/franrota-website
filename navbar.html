      <!-- Language Switcher -->

<script>
  // ===== LANGUAGE TOGGLE =====
  function setLanguage(lang) {
    localStorage.setItem('siteLang', lang);
    document.querySelectorAll('.lang-it').forEach(el => el.style.display = lang === 'it' ? 'block' : 'none');
    document.querySelectorAll('.lang-en').forEach(el => el.style.display = lang === 'en' ? 'block' : 'none');

    // update aria-pressed for buttons
    const btnIt = document.getElementById('btn-it');
    const btnEn = document.getElementById('btn-en');
    if(btnIt) btnIt.setAttribute('aria-pressed', lang === 'it');
    if(btnEn) btnEn.setAttribute('aria-pressed', lang === 'en');
  }

  document.addEventListener('DOMContentLoaded', () => {
    const savedLang = localStorage.getItem('siteLang') || 'it';
    setLanguage(savedLang);

    // attach click events to buttons
    document.getElementById('btn-it').addEventListener('click', () => setLanguage('it'));
    document.getElementById('btn-en').addEventListener('click', () => setLanguage('en'));
  });

  // ===== ACTIVE LINK ON INDEX SCROLL =====
  document.addEventListener('scroll', () => {
    if(!window.location.href.includes('index.html') && window.location.pathname !== '/') return;

    const sections = document.querySelectorAll('section[id]');
    const scrollPos = window.scrollY + 200;
    sections.forEach(sec => {
      if (scrollPos >= sec.offsetTop && scrollPos < sec.offsetTop + sec.offsetHeight) {
        document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
        const current = document.querySelector(`a[href="#${sec.id}"]`);
        if(current) current.classList.add('active');
      }
    });
  });
</script>
