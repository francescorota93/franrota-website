<script>
  // ===== LANGUAGE TOGGLE =====
  function setLanguage(lang) {
    localStorage.setItem('siteLang', lang);
    document.documentElement.lang = lang;
    document.querySelectorAll('.lang-it').forEach(el => el.style.display = lang === 'it' ? 'inline' : 'none');
    document.querySelectorAll('.lang-en').forEach(el => el.style.display = lang === 'en' ? 'inline' : 'none');
  }

  document.addEventListener('DOMContentLoaded', () => {
    const savedLang = localStorage.getItem('siteLang') || 'it';
    setLanguage(savedLang);
  });

  // ===== NAVBAR ACTIVE LINK ON SCROLL =====
  document.addEventListener('scroll', () => {
    const sections = document.querySelectorAll('section[id]');
    const scrollPos = window.scrollY + 200;
    sections.forEach(sec => {
      if (scrollPos >= sec.offsetTop && scrollPos < sec.offsetTop + sec.offsetHeight) {
        document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
        const current = document.querySelector(`a[href="#${sec.id}"]`);
        if (current) current.classList.add('active');
      }
    });
  });
</script>
